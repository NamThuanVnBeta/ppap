name: CI · Checks · Reusable

# Reusable CI graph: biome / typecheck / lint / test in parallel against an
# arbitrary erp-namthuan ref. Called by both PR-CI (ppap:ci-pr.yml) and the
# deploy gate (ppap:deploy-reusable.yml). Outputs each job's `result` so
# callers can build a per-job summary.

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: 'erp-namthuan ref to check out (refs/pull/<N>/merge for PR CI, sha for staging deploy, refs/tags/<tag> for production).'
        type: string
        required: true
      e2e_shards:
        description: 'Number of parallel Playwright shards. Tune up/down here; both PR CI and the deploy gate inherit it.'
        type: number
        default: 12
      run_e2e:
        description: 'Whether to run the e2e matrix. PR CI keeps the default (true); the deploy gate passes false so staging/production builds are not blocked on dashboard e2e.'
        type: boolean
        default: true
      e2e_changed_only:
        description: 'Scope e2e to the changed service''s specs (broad/shared change → full suite, nothing relevant → skip). PR CI passes true; the production deploy gate leaves the default false → full suite. See scripts/e2e-plan.sh.'
        type: boolean
        default: false
    outputs:
      biome:
        description: 'Result of the biome job'
        value: ${{ jobs.biome.result }}
      typecheck:
        description: 'Result of the typecheck job'
        value: ${{ jobs.typecheck.result }}
      lint:
        description: 'Result of the lint job'
        value: ${{ jobs.lint.result }}
      test:
        description: 'Result of the test job'
        value: ${{ jobs.test.result }}
      e2e:
        description: 'Aggregated e2e result: success when all shards pass OR when a change-scoped run had nothing relevant to test (skip); failure if any shard failed.'
        value: ${{ jobs.e2e-aggregate.outputs.result }}
      noise_clean:
        description: '"true" when the run has zero flaky / dup-testid / hydration / i18n-missing / font-preload / http-404 / biome-warning / vitest-stderr; "false" otherwise. Empty if the noise scan did not run.'
        value: ${{ jobs.noise-report.outputs.clean }}
      noise_summary:
        description: 'Compact per-signal noise counts, e.g. "flaky 0 · dup 0 · hyd 0 · i18n 0 · font 0 · 404 0 · biome 0 · vitest 0".'
        value: ${{ jobs.noise-report.outputs.summary }}
    secrets:
      PAT_TOKEN:
        required: true

permissions: read-all

env:
  PRIVATE_REPO: NamThuanVn/erp-namthuan
  # Pre-seed init.defaultBranch so actions/checkout's internal `git init` stops
  # printing the "hint: git config --global init.defaultBranch <name>" line on
  # every job. git reads these GIT_CONFIG_* env vars as extra config, so the
  # hint's precondition (unset init.defaultBranch) is never met. Cosmetic
  # CI-log-noise removal only.
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  biome:
    name: 1 · CI · Biome (format + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - uses: ./.github/actions/install

      - run: pnpm biome ci .

      # Repo-wide suppression/skip gate: no biome-ignore / eslint-disable /
      # @ts-ignore and no test skip in ANY form may exist in the codebase
      # (.claude/rules.md § "Never skip checks, never suppress").
      - run: bash scripts/check-no-suppressions.sh

  typecheck:
    name: 1 · CI · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - uses: ./.github/actions/install

      - run: pnpm typecheck

  lint:
    name: 1 · CI · Lint workspaces (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - uses: ./.github/actions/install

      - run: pnpm lint:js:packages

  test:
    name: 1 · CI · Unit tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - uses: ./.github/actions/install

      - run: pnpm test:ci

  # Plan the e2e run. Two responsibilities:
  #   1. Decide SCOPE — when e2e_changed_only is true (PR CI), diff the PR
  #      (HEAD^1..HEAD on refs/pull/N/merge) through scripts/e2e-plan.sh:
  #      full | scoped <specs> | skip. Otherwise (deploy gate) → full.
  #   2. Fan the effective shard count into a JSON array (`[1,2,...,N]`) for the
  #      matrix via fromJSON — full → e2e_shards shards; scoped → 1 shard (a
  #      handful of specs doesn't need 12 stacks); skip → empty (matrix no-op).
  # Pure git + jq + bash (no pnpm install). `run` is 'true' unless mode==skip.
  e2e-plan:
    name: 1 · CI · E2E (plan)
    if: ${{ inputs.run_e2e }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.plan.outputs.run }}
      mode: ${{ steps.plan.outputs.mode }}
      targets: ${{ steps.plan.outputs.targets }}
      shards: ${{ steps.plan.outputs.shards }}
      total: ${{ steps.plan.outputs.total }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.checkout_ref }}
          # Full history so HEAD^1 (the PR's base parent on the merge ref) is
          # available for the diff.
          fetch-depth: 0
          persist-credentials: false

      - id: plan
        env:
          CHANGED_ONLY: ${{ inputs.e2e_changed_only }}
          TOTAL: ${{ inputs.e2e_shards }}
        run: |
          set -euo pipefail
          MODE=full
          TARGETS=""
          if [ "$CHANGED_ONLY" = "true" ]; then
            # HEAD^1 on refs/pull/N/merge = the base (main); the diff to HEAD is
            # exactly the PR's delta.
            DECISION="$(E2E_PLAN_BASE=HEAD^1 bash scripts/e2e-plan.sh)"
            MODE="${DECISION%% *}"
            TARGETS="${DECISION#"$MODE"}"; TARGETS="${TARGETS# }"
          fi
          case "$MODE" in
            skip)
              echo "run=false"  >> "$GITHUB_OUTPUT"
              echo "shards=[]"  >> "$GITHUB_OUTPUT"
              echo "total=0"    >> "$GITHUB_OUTPUT" ;;
            scoped)
              echo "run=true"   >> "$GITHUB_OUTPUT"
              echo "shards=[1]" >> "$GITHUB_OUTPUT"
              echo "total=1"    >> "$GITHUB_OUTPUT" ;;
            *)
              SHARDS=$(seq 1 "$TOTAL" | jq -R 'tonumber' | jq -cs '.')
              echo "run=true"       >> "$GITHUB_OUTPUT"
              echo "shards=$SHARDS"  >> "$GITHUB_OUTPUT"
              echo "total=$TOTAL"    >> "$GITHUB_OUTPUT" ;;
          esac
          echo "mode=$MODE"       >> "$GITHUB_OUTPUT"
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
          echo "▶ e2e plan: mode=$MODE targets=[$TARGETS]" >&2

  # Build each dashboard zone on its OWN runner, in parallel. The 6 OpenNext
  # zones are fully independent (no cross-zone deps; dashboard-shell exports raw
  # `src/` so there's no prebuild step), so a per-zone matrix turns the old
  # ~258s serial "build all 6 on one 2-core runner" step into ~6 concurrent
  # ~60–90s builds — the dominant PR-CI / deploy-gate cost. Each leg tars its own
  # `apps/<zone>/.open-next` and uploads it; the shards download every zone tar
  # and reassemble the tree. `fail-fast: false` so one zone's build failure
  # doesn't mask the others. Free on public-repo minutes — fan out wide.
  e2e-build-zones:
    name: 1 · CI · E2E (build ${{ matrix.zone.name }})
    needs: e2e-plan
    # Skipped when the plan says nothing e2e-relevant changed. A scoped run still
    # builds ALL zones — the e2e stack boots the whole multi-zone router.
    if: ${{ inputs.run_e2e && needs.e2e-plan.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        zone:
          - { name: shell, pkg: '@namthuanvn/shell' }
          - { name: expense, pkg: '@namthuanvn/zone-expense' }
          - { name: exms, pkg: '@namthuanvn/zone-exms' }
          - { name: oms, pkg: '@namthuanvn/zone-oms' }
          - { name: sourcing, pkg: '@namthuanvn/zone-sourcing' }
          - { name: bom, pkg: '@namthuanvn/zone-bom' }
          - { name: quotation, pkg: '@namthuanvn/zone-quotation' }
          - { name: procurement, pkg: '@namthuanvn/zone-procurement' }
          - { name: hris, pkg: '@namthuanvn/zone-hris' }
          - { name: utilities, pkg: '@namthuanvn/zone-utilities' }
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - uses: ./.github/actions/install

      # Warm THIS zone's Next compiler cache across runs. build:pages still runs
      # (so it always re-evaluates source — no stale-build risk) but reuses prior
      # compilation work, cutting a cold ~60–120s build to ~20–40s on unchanged
      # source. Keyed per-zone so the matrix legs don't clobber one another's
      # cache. Invalidates on lockfile + dashboard/packages source changes.
      - name: Cache Next build
        uses: actions/cache@v5
        with:
          path: apps/${{ matrix.zone.name }}/.next/cache
          key: next-${{ runner.os }}-${{ matrix.zone.name }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/**', 'packages/**') }}
          restore-keys: |
            next-${{ runner.os }}-${{ matrix.zone.name }}-${{ hashFiles('pnpm-lock.yaml') }}-
            next-${{ runner.os }}-${{ matrix.zone.name }}-

      # Generic relative `/api` build — no host/port baked, so the same bundle
      # boots on every shard's free port.
      - name: Build zone (OpenNext)
        run: pnpm --filter ${{ matrix.zone.pkg }} run build:pages

      # tar (not a raw many-small-files upload) so the .open-next file count
      # doesn't make upload/download slow. The bundle is already minified, so
      # skip artifact gzip. tar preserves the `apps/<zone>/.open-next` path so
      # the shard reassembles the tree verbatim by untarring every zone tar.
      - name: Package zone build
        run: tar -cf zone-${{ matrix.zone.name }}.tar apps/${{ matrix.zone.name }}/.open-next

      - name: Upload zone build
        uses: actions/upload-artifact@v7
        with:
          name: e2e-zone-${{ matrix.zone.name }}
          path: zone-${{ matrix.zone.name }}.tar
          retention-days: 1
          compression-level: 0

  # Seed the isolated e2e DB ONCE, in parallel with the zone builds (it only
  # needs the per-service migration scripts, not the dashboard build output).
  # Isolated-state branch of db-reset.sh: per-service `wrangler d1 migrations
  # apply --persist-to .wrangler/state-e2e`, no ExMS demo seed — exactly the DB
  # each shard would have produced itself. Each shard is a separate runner, so
  # its untarred copy of the state dir is its own mutable DB — shard isolation
  # is preserved without snapshotting.
  e2e-seed:
    name: 1 · CI · E2E (seed db)
    needs: e2e-plan
    if: ${{ inputs.run_e2e && needs.e2e-plan.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - uses: ./.github/actions/install

      - name: Seed e2e database (once)
        run: STATE_DIR=.wrangler/state-e2e bash scripts/db-reset.sh

      # Mostly-incompressible sqlite — skip artifact gzip.
      - name: Package seed
        run: tar -cf e2e-seed.tar .wrangler/state-e2e

      - name: Upload e2e seed
        uses: actions/upload-artifact@v7
        with:
          name: e2e-seed
          path: e2e-seed.tar
          retention-days: 1
          compression-level: 0

  # Playwright e2e. Each shard restores the prebuilt zone bundles + seeded DB
  # from the e2e-build-zones matrix + e2e-seed artifacts, then boots ONE wrangler
  # session via `pnpm e2e:serve` with BUILD=0 RESEED=0 (dashboard worker primary,
  # gateway & leaves as portless auxiliaries — on a free port, with NO proxy and
  # NO assistant) and runs its slice of specs against http://localhost:<port> via
  # PLAYWRIGHT_NO_WEB_SERVER=1 so Playwright doesn't spawn its own server. Because
  # build + seed already ran in parallel upstream, the per-shard boot is just the
  # wrangler cold start.
  # `fail-fast: true`: the first shard to hard-fail cancels the others so the
  # run stops fast instead of grinding through all shards (paired with
  # Playwright `maxFailures: 1`, which stops a shard at its first hard failure).
  # Flaky tests pass on retry and never hard-fail, so this does NOT cancel on a
  # flaky retry — only a genuine failure. The aggregated `jobs.e2e.result` still
  # flips to `failure` if any shard fails. Trade-off vs the old `false`: you see
  # one failure at a time (fix, re-run) rather than the full failure set at once.
  e2e:
    name: 1 · CI · E2E (shard ${{ matrix.shard }})
    needs: [e2e-plan, e2e-build-zones, e2e-seed]
    if: ${{ inputs.run_e2e && needs.e2e-plan.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        shard: ${{ fromJSON(needs.e2e-plan.outputs.shards) }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - uses: ./.github/actions/install

      # Restore every zone's build (.open-next) + the seeded DB
      # (.wrangler/state-e2e), produced in parallel by the e2e-build-zones matrix
      # + e2e-seed. `pattern: e2e-*` matches all ten `e2e-zone-<name>` artifacts
      # plus `e2e-seed`; `merge-multiple: true` lands every tar in the cwd.
      # Untarring all of them reassembles the exact same tree the old single
      # combined bundle produced. This is this shard's own mutable copy — tests
      # can write freely without affecting other shards.
      - name: Restore e2e build + seed
        uses: actions/download-artifact@v7
        with:
          pattern: e2e-*
          merge-multiple: true

      - name: Unpack e2e build + seed
        run: |
          for f in *.tar; do tar -xf "$f"; done

      # No /etc/hosts or TLS cert: e2e hits the dashboard worker directly on a
      # free port over plain http://localhost (no proxy, no namthuan.local).

      # Cache the Chromium download keyed on @playwright/test's resolved
      # version from the lockfile. Saves ~1 min/shard on cache hit.
      - name: Resolve Playwright version
        id: pw
        run: |
          set -euo pipefail
          VER=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # Boot a dedicated e2e stack on a free port (dashboard worker + gateway +
      # leaves as bindings + one `wrangler dev` per zone worker — NO proxy, NO
      # assistant) via scripts/ci-boot-e2e.sh: boot + /api/health + per-zone probe
      # (a zone that booted but serves 5xx is caught here, before the tests, with
      # a precise `::error::zone <x> …`), in its own process group (BUILD=0
      # RESEED=0 — build + seed came from the restored artifacts). Then run THIS
      # shard's Playwright slice against the reported port. Reboot the stack and
      # re-run the shard ONCE on an INFRA failure — the boot failed (a crashed /
      # SQLITE_BUSY-locked zone) OR the tests failed because the serve process
      # died mid-run (a workerd crash → ECONNREFUSED cascade Playwright's own
      # retries can't recover, since the server is gone). A test failure with the
      # stack still ALIVE is genuine red — never retried, so we don't mask it.
      - name: Boot e2e stack + run Playwright shard ${{ matrix.shard }}/${{ needs.e2e-plan.outputs.total }}
        env:
          PLAYWRIGHT_NO_WEB_SERVER: '1'
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ needs.e2e-plan.outputs.total }}
          # Space-separated spec paths on a change-scoped run; empty on a full
          # run (Playwright then runs every spec). Word-split intentionally.
          E2E_TARGETS: ${{ needs.e2e-plan.outputs.targets }}
          # The e2e base URL stays `localhost` (design-system specs hardcode
          # `domain: localhost` theme cookies, see scripts/e2e-run.sh). On the CI
          # runner Node resolves `localhost` to IPv6 `::1` first, but wrangler dev
          # listens on IPv4 only → Playwright's Node `request` fixture got
          # `connect ECONNREFUSED ::1:<port>`. Force IPv4-first resolution so
          # `localhost` connects to 127.0.0.1 where the worker actually listens,
          # without changing the cookie domain.
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          set -uo pipefail
          # Backward-compat: PRs branched before this change don't ship
          # scripts/ci-boot-e2e.sh — boot the legacy inline way (no zone probe,
          # no reboot-retry) so their e2e still runs. Remove once every open PR
          # has rebased past this commit.
          if [ ! -f scripts/ci-boot-e2e.sh ]; then
            set -m
            nohup env BUILD=0 RESEED=0 pnpm e2e:serve >e2e-serve.log 2>&1 &
            SERVE_PID=$!
            set +m
            echo "$SERVE_PID" > .wrangler/e2e-serve.pid
            for _ in $(seq 1 60); do
              [ -s .wrangler/e2e-port ] && break
              kill -0 "$SERVE_PID" 2>/dev/null || { echo "::error::e2e:serve exited early"; tail -n 80 e2e-serve.log; exit 1; }
              sleep 1
            done
            PORT="$(cat .wrangler/e2e-port 2>/dev/null || true)"
            [ -z "$PORT" ] && { echo "::error::e2e:serve never reported a port"; tail -n 80 e2e-serve.log; exit 1; }
            deadline=$((SECONDS + 300))
            ready=0
            while (( SECONDS < deadline )); do
              kill -0 "$SERVE_PID" 2>/dev/null || { echo "::error::e2e stack exited before becoming ready"; tail -n 80 e2e-serve.log; exit 1; }
              curl -sf "http://localhost:$PORT/api/health" >/dev/null 2>&1 && { ready=1; break; }
              sleep 1
            done
            [ "$ready" = 1 ] || { echo "::error::Timed out waiting for /api/health"; tail -n 80 e2e-serve.log; exit 1; }
            # shellcheck disable=SC2086  # E2E_TARGETS is an intentional path list
            PLAYWRIGHT_BASE_URL="http://localhost:$PORT" pnpm exec playwright test --reporter=line --shard="$SHARD/$TOTAL" $E2E_TARGETS
            exit $?
          fi
          serve_alive() { local p; p="$(cat .wrangler/e2e-serve.pid 2>/dev/null || true)"; [ -n "$p" ] && kill -0 "$p" 2>/dev/null; }
          teardown_serve() {
            local p; p="$(cat .wrangler/e2e-serve.pid 2>/dev/null || true)"
            [ -n "$p" ] || return 0
            kill -TERM -- -"$p" 2>/dev/null || true; sleep 2; kill -KILL -- -"$p" 2>/dev/null || true
          }
          # One attempt = boot the stack, then run this shard's slice. A boot
          # failure returns the sentinel 70 (an INFRA failure — a crashed/locked
          # zone, e.g. SENTRY_DO SQLITE_BUSY) so it's distinguishable from a
          # Playwright test failure (small exit codes). The helper already tears
          # its own stack down on boot failure.
          attempt() {
            bash scripts/ci-boot-e2e.sh || return 70
            # shellcheck disable=SC2086  # E2E_TARGETS is an intentional path list
            PLAYWRIGHT_BASE_URL="http://localhost:$(cat .wrangler/e2e-port)" \
              pnpm exec playwright test --reporter=line --shard="$SHARD/$TOTAL" $E2E_TARGETS
          }
          attempt
          rc=$?
          [ "$rc" -eq 0 ] && exit 0
          # Reboot+retry ONCE for an infra failure: boot failed (rc=70), OR the
          # tests failed AND the serve process died mid-run (a workerd crash →
          # ECONNREFUSED cascade Playwright's own retries can't recover). A test
          # failure with the stack STILL ALIVE is genuine red — never retried, so
          # we don't mask real failures.
          if [ "$rc" -ne 70 ] && serve_alive; then
            echo "::error::shard $SHARD/$TOTAL failed with the stack still alive — a genuine test failure, not retrying"
            teardown_serve
            exit "$rc"
          fi
          echo "::warning::infra failure on shard $SHARD/$TOTAL (rc=$rc) — rebooting the stack and re-running this shard once"
          teardown_serve
          # Keep the first attempt's boot log for the failure upload.
          mv e2e-serve.log e2e-serve.attempt1.log 2>/dev/null || true
          attempt

      - name: Tear down e2e stack
        if: always()
        run: |
          SERVE_PID="$(cat .wrangler/e2e-serve.pid 2>/dev/null || true)"
          if [ -n "$SERVE_PID" ]; then
            kill -TERM -- -"$SERVE_PID" 2>/dev/null || true
            sleep 2
            kill -KILL -- -"$SERVE_PID" 2>/dev/null || true
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
            e2e-serve*.log
          retention-days: 7
          if-no-files-found: ignore

  # Collapse the sharded e2e matrix into the single `e2e` workflow output the
  # callers consume. Load-bearing for the change-scoped path: when the plan says
  # `skip` (nothing e2e-relevant changed), the e2e matrix is SKIPPED — but a
  # skipped job reports `skipped`, and ci-pr.yml's report flips CI red on
  # anything other than `success`. Mapping skip → success keeps that contract
  # intact. Runs always() so it reports even when the matrix skipped/failed.
  e2e-aggregate:
    name: 1 · CI · E2E (result)
    needs: [e2e-plan, e2e]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      result: ${{ steps.agg.outputs.result }}
    steps:
      - id: agg
        env:
          PLAN_RESULT: ${{ needs.e2e-plan.result }}
          PLAN_RUN: ${{ needs.e2e-plan.outputs.run }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          set -euo pipefail
          if [ "$PLAN_RESULT" = "skipped" ]; then
            # e2e disabled for this caller (run_e2e=false) — mirror the old
            # `jobs.e2e.result` (skipped) so nothing downstream changes.
            RESULT=skipped
          elif [ "$PLAN_RUN" != "true" ]; then
            # Change-scoped plan found nothing e2e-relevant → treat as pass.
            RESULT=success
          else
            RESULT="$E2E_RESULT"
          fi
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "▶ e2e aggregate: plan=$PLAN_RESULT run=$PLAN_RUN e2e=$E2E_RESULT → $RESULT" >&2

  # Precompute the "green-but-noisy" signals ONCE, server-side, into a tiny
  # `ci-noise-report` artifact so /watch-ci and /fix-ci read ONE small file
  # instead of downloading every e2e shard log over the network. It captures the
  # masks a green run hides (see .claude/commands/fix-ci.md): flaky retries,
  # report-only dup-testid / hydration-error annotations, the browser-only
  # i18n-missing / font-preload / http-404 signals the e2e fixtures tag, biome
  # warnings, and vitest stderr — same signals, a fraction of the client's time.
  #
  # SAFE BY CONSTRUCTION: this job only READS this run's own job logs (default
  # GITHUB_TOKEN, actions:read via the workflow's read-all). It publishes:
  #   • a tiny `ci-noise-report` artifact — /watch-ci and /fix-ci read ONE file
  #     instead of downloading every shard log;
  #   • `clean` + `summary` job outputs — ci-pr.yml's `report` job reads these to
  #     gate the labeled auto-merge and to post the PR CI comment.
  # `continue-on-error: true` PLUS `set +e` means it can NEVER red the run or
  # affect the CI status the `report` job posts (that status is computed only
  # from the biome/typecheck/lint/test/e2e outputs above). If it can't run or
  # the artifact is absent (a PR whose CI predates this job), the client falls
  # back to its own per-shard log grep and `report` treats noise as unknown
  # (→ not clean → no auto-merge).
  #
  # NOTE: GitHub runs `run:` steps as `bash -e {0}` (errexit ON). The scan is a
  # pipeline of greps that legitimately exit non-zero on "no match", so we MUST
  # `set +e` — otherwise a zero-match grep aborts the step before the outputs /
  # artifact are written (that was the original failure: run 29478177936).
  noise-report:
    name: 1 · CI · Noise report
    needs: [biome, test, e2e-aggregate]
    # PR CI only (run_e2e=true) — the deploy gate (run_e2e=false) has no
    # /watch-ci consumer, so keep this off the deploy critical path entirely.
    if: ${{ always() && inputs.run_e2e }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: true
    outputs:
      clean: ${{ steps.scan.outputs.clean }}
      summary: ${{ steps.scan.outputs.summary }}
    steps:
      - name: Scan this run's logs for noise
        id: scan
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set +e -uo pipefail   # errexit OFF — zero-match greps below exit non-zero by design
          tmp="$(mktemp -d)"
          : > "$tmp/e2e.log"; : > "$tmp/biome.log"; : > "$tmp/test.log"
          # Map every job in THIS run to (id, name); pull each relevant job's log
          # once. Job names carry the reusable-workflow prefix ("checks / 1 · CI
          # · E2E (shard 3)") — substring match still finds them.
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs" --paginate \
            --jq '.jobs[]? | [(.id|tostring), .name] | @tsv' 2>/dev/null \
            | while IFS="$(printf '\t')" read -r id name; do
                [ -n "$id" ] || continue
                case "$name" in
                  *"E2E (shard"*)  dest="$tmp/e2e.log" ;;
                  *"Biome"*)       dest="$tmp/biome.log" ;;
                  *"Unit tests"*)  dest="$tmp/test.log" ;;
                  *)               continue ;;
                esac
                gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${id}/logs" 2>/dev/null \
                  | sed -E 's/\x1b\[[0-9;]*m//g' >> "$dest"
              done
          # grep exits non-zero on no-match; with errexit OFF that's fine — awk
          # always prints a number, and grep -c always prints its count.
          num() { grep -oiE "$1" "$2" 2>/dev/null | grep -oE '[0-9]+' | awk '{s+=$1} END{print s+0}'; }
          cnt() { grep -acE "$1" "$2" 2>/dev/null | head -1; }
          flaky=$(num '([0-9]+) flaky' "$tmp/e2e.log"); flaky=${flaky:-0}
          dup=$(cnt '\[dup-testid\]' "$tmp/e2e.log"); dup=${dup:-0}
          hyd=$(cnt '\[hydration-error\]' "$tmp/e2e.log"); hyd=${hyd:-0}
          # Browser-only signals the e2e fixtures tag per test (apps/shell/e2e/fixtures.ts):
          # missing i18n keys, unused next/font preloads, 4xx/404 resource loads.
          i18n=$(cnt '\[i18n-missing\]' "$tmp/e2e.log"); i18n=${i18n:-0}
          font=$(cnt '\[font-preload\]' "$tmp/e2e.log"); font=${font:-0}
          http404=$(cnt '\[http-404\]' "$tmp/e2e.log"); http404=${http404:-0}
          biomew=$(num 'Found ([0-9]+) warning' "$tmp/biome.log"); biomew=${biomew:-0}
          vitest=$(cnt 'stderr \||not wrapped in act' "$tmp/test.log"); vitest=${vitest:-0}
          total=$(( flaky + dup + hyd + i18n + font + http404 + biomew + vitest ))
          clean=true; [ "$total" -gt 0 ] && clean=false
          summary=$(printf 'flaky %s · dup %s · hyd %s · i18n %s · font %s · 404 %s · biome %s · vitest %s' "$flaky" "$dup" "$hyd" "$i18n" "$font" "$http404" "$biomew" "$vitest")
          {
            echo "clean=$clean"
            echo "summary=$summary"
          } >> "$GITHUB_OUTPUT"
          mkdir -p ci-noise
          printf '{"flaky":%s,"dup_testid":%s,"hydration":%s,"i18n_missing":%s,"font_preload":%s,"http_4xx":%s,"biome_warnings":%s,"vitest_stderr":%s,"clean":%s}\n' \
            "$flaky" "$dup" "$hyd" "$i18n" "$font" "$http404" "$biomew" "$vitest" "$clean" | tee ci-noise/ci-noise-report.json
          echo "▶ noise: $summary → clean=$clean"
          exit 0

      - name: Upload noise report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-noise-report
          path: ci-noise/ci-noise-report.json
          retention-days: 7
          if-no-files-found: ignore
